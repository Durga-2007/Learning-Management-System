<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - AI Cloud LMS</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-bg">
    <div class="container d-flex justify-content-center align-items-center">
        <div class="login-card" style="max-width: 550px;">
            <div class="login-header">
                <h3 class="mb-1"><i class="fa-solid fa-user-plus me-2"></i>Student Register</h3>
                <p class="mb-0 text-white-50">Join the AI-Powered Learning Portal</p>
            </div>
            
            <div class="login-body">
                <!-- Flash Messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{% if category == 'error' %}danger{% else %}{{ category }}{% endif %} alert-dismissible fade show p-2 border-0 shadow-sm" role="alert" style="font-size: 0.85rem;">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" style="padding: 0.75rem;"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form action="{{ url_for('register') }}" method="POST" id="register-form">
                    <div class="row">
                        <!-- Full Name -->
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label" style="font-weight: 500; font-size: 0.9rem; color: #555;">Full Name</label>
                            <input type="text" name="name" id="name" class="form-control form-control-custom" placeholder="John Doe" required>
                        </div>
                        
                        <!-- Email Address -->
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label" style="font-weight: 500; font-size: 0.9rem; color: #555;">Email Address</label>
                            <input type="email" name="email" id="email" class="form-control form-control-custom" placeholder="john@college.com" required>
                        </div>
                    </div>

                    <div class="row">
                        <!-- Roll Number -->
                        <div class="col-md-6 mb-3">
                            <label for="roll_no" class="form-label" style="font-weight: 500; font-size: 0.9rem; color: #555;">Roll Number</label>
                            <input type="text" name="roll_no" id="roll_no" class="form-control form-control-custom" placeholder="CS2026-001" required>
                        </div>
                        
                        <!-- Department -->
                        <div class="col-md-6 mb-3">
                            <label for="department" class="form-label" style="font-weight: 500; font-size: 0.9rem; color: #555;">Department</label>
                            <select name="department" id="department" class="form-select form-control-custom" required>
                                <option value="" disabled selected>Select Department</option>
                                <option value="Computer Science & Engineering">Computer Science & Eng.</option>
                                <option value="Information Technology">Information Technology</option>
                                <option value="Electrical Engineering">Electrical Engineering</option>
                                <option value="Mechanical Engineering">Mechanical Engineering</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <!-- Password -->
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label" style="font-weight: 500; font-size: 0.9rem; color: #555;">Password</label>
                            <input type="password" name="password" id="password" class="form-control form-control-custom" placeholder="Min 6 characters" required minlength="6">
                        </div>
                        
                        <!-- Confirm Password -->
                        <div class="col-md-6 mb-4">
                            <label for="confirm_password" class="form-label" style="font-weight: 500; font-size: 0.9rem; color: #555;">Confirm Password</label>
                            <input type="password" name="confirm_password" id="confirm_password" class="form-control form-control-custom" placeholder="••••••••" required>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary-custom w-100 btn-custom mb-3">
                        <i class="fa-solid fa-user-plus me-2"></i>Create Account
                    </button>
                    
                    <div class="text-center mt-2">
                        <p class="mb-0 text-muted" style="font-size: 0.9rem;">
                            Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none" style="color: var(--primary-color); font-weight: 600;">Sign In</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Password Match Verification Script -->
    <script>
        document.getElementById('register-form').addEventListener('submit', function(e) {
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirm_password').value;
            if (password !== confirmPassword) {
                e.preventDefault();
                alert("Passwords do not match!");
            }
        });
    </script>
    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
