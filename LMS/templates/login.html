<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Cloud LMS</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-bg">
    <div class="container d-flex justify-content-center align-items-center">
        <div class="login-card">
            <div class="login-header">
                <h3 class="mb-1"><i class="fa-solid fa-cloud-sun-rain me-2"></i>Cloud LMS</h3>
                <p class="mb-0 text-white-50">AI-Powered Learning Management System</p>
            </div>
            
            <div class="login-body">
                <!-- Flash Messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{% if category == 'error' %}danger{% else %}{{ category }}{% endif %} alert-dismissible fade show p-2 border-0 shadow-sm" role="alert" style="font-size: 0.85rem;">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" style="padding: 0.75rem;"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form action="{{ url_for('login') }}" method="POST">
                    <!-- Role Dropdown -->
                    <div class="mb-3">
                        <label for="role" class="form-label" style="font-weight: 500; font-size: 0.9rem; color: #555;">Login As</label>
                        <select name="role" id="role" class="form-select form-control-custom" required>
                            <option value="student" selected>Student</option>
                            <option value="faculty">Faculty / Teacher</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>

                    <!-- Email Input -->
                    <div class="mb-3">
                        <label for="email" class="form-label" style="font-weight: 500; font-size: 0.9rem; color: #555;">Email Address</label>
                        <input type="email" name="email" id="email" class="form-control form-control-custom" placeholder="name@college.com" required>
                    </div>

                    <!-- Password Input -->
                    <div class="mb-4">
                        <label for="password" class="form-label" style="font-weight: 500; font-size: 0.9rem; color: #555;">Password</label>
                        <input type="password" name="password" id="password" class="form-control form-control-custom" placeholder="••••••••" required>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary-custom w-100 btn-custom mb-3">
                        <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
                    </button>
                    
                    <div class="text-center mt-3">
                        <p class="mb-0 text-muted" style="font-size: 0.9rem;">
                            New student? <a href="{{ url_for('register') }}" class="text-decoration-none" style="color: var(--primary-color); font-weight: 600;">Create an Account</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
